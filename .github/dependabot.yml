version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
    groups:
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@next/third-parties"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@vitejs/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    open-pull-requests-limit: 10
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    ignore:
      - dependency-name: "github/gh-aw-actions*" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
    exclude-paths:
      - .github/workflows/*.lock.yml # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
      - .github/workflows/copilot-setup-steps.yml # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
    open-pull-requests-limit: 10
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action/*"
